name: Release

# Changesets flow: on push to main, open/update a "Version Packages" PR. When that PR merges
# (consuming the changesets), publish the affected packages to npm with provenance.
on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the version PR / tags
  pull-requests: write # open the version PR
  id-token: write # npm provenance (OIDC)

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    # Expose the secret as env so the publish step can be guarded on its presence.
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: pnpm install

      - run: pnpm build

      # Only run the release machinery once an NPM_TOKEN secret exists. Until then this is a
      # no-op (green), so every push to main doesn't fail trying to publish 0.0.0 with no auth.
      # To cut M1: add the NPM_TOKEN secret, then push a changeset — the action opens a
      # "Version Packages" PR; merging it bumps the version off 0.0.0 and the next run publishes.
      - name: Create Release PR or publish
        if: ${{ env.NPM_TOKEN != '' }}
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
